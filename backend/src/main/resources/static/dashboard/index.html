<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 · 智能物流合同管理系统</title>

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Chart.js 用于图表展示 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f9ff;
            min-height: 100vh;
            color: #1e293b;
        }

        /* ========== 布局 ========== */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0b2b4a 0%, #123b5e 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 4px 0 20px rgba(0, 30, 60, 0.15);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #7ab7ff;
            backdrop-filter: blur(4px);
        }

        .logo-text h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.25s;
            margin-bottom: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 22px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, #2d6da0, #1a4b75);
            color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .nav-item.active i {
            color: #ffd966;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 35px;
            background: #f5f9ff;
        }

        /* ========== 顶部导航 ========== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(0, 30, 60, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
        }

        .page-title h1 {
            font-size: 24px;
            color: #1a4b75;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h1 i {
            color: #2d6da0;
            font-size: 28px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 22px;
            color: #2d6da0;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 6px;
            border-radius: 30px;
            min-width: 18px;
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 40px;
            background: #f0f7ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-info:hover {
            background: #e3f0ff;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2d6da0, #1a4b75);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-details {
            line-height: 1.4;
        }

        .user-name {
            font-weight: 700;
            color: #1a4b75;
        }

        .user-role {
            font-size: 12px;
            color: #5f7d9c;
        }

        /* ========== 统计卡片 ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.08);
            border: 1px solid rgba(45, 109, 160, 0.1);
            transition: transform 0.25s, box-shadow 0.25s;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(26, 75, 117, 0.15);
            border-color: rgba(45, 109, 160, 0.3);
        }

        .stat-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(145deg, #e8f0fe, #d6e9ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #1a4b75;
        }

        .stat-info h3 {
            font-size: 15px;
            font-weight: 500;
            color: #4f6f8f;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #1a4b75;
            letter-spacing: -0.5px;
        }

        .stat-trend {
            font-size: 13px;
            margin-top: 6px;
            color: #10b981;
        }

        .stat-trend i {
            margin-right: 4px;
        }

        /* ========== 图表和表格区域 ========== */
        .charts-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 22px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            font-size: 18px;
            color: #1a4b75;
            font-weight: 600;
        }

        .chart-header select {
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid #d0e1f2;
            color: #1a4b75;
            font-weight: 500;
            background: #f8fcff;
            cursor: pointer;
            outline: none;
        }

        .chart-container {
            height: 280px;
            position: relative;
        }

        /* ========== 待办事项 ========== */
        .tasks-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.05);
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tasks-header h3 {
            font-size: 18px;
            color: #1a4b75;
            font-weight: 600;
        }

        .view-all {
            color: #2d6da0;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #eef2f6;
            gap: 15px;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-check {
            width: 24px;
            height: 24px;
            border: 2px solid #cbd6e4;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-check.checked {
            background: #2d6da0;
            border-color: #2d6da0;
            position: relative;
        }

        .task-check.checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: white;
            font-size: 14px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #6b7b8f;
        }

        .task-meta i {
            margin-right: 4px;
            color: #2d6da0;
        }

        .task-priority {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .priority-high {
            background: #fee9e9;
            color: #dc3545;
        }

        .priority-medium {
            background: #fff4e0;
            color: #f59e0b;
        }

        .priority-low {
            background: #e3f7ec;
            color: #10b981;
        }

        /* ========== 最近合同表格 ========== */
        .recent-contracts {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-top: 30px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.05);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 12px;
            color: #4f6f8f;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid #e3ecf5;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #eef2f6;
            color: #2d4059;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #e3f7ec;
            color: #10b981;
        }

        .status-pending {
            background: #fff4e0;
            color: #f59e0b;
        }

        .status-expired {
            background: #fee9e9;
            color: #dc3545;
        }

        .action-btn {
            background: none;
            border: none;
            color: #2d6da0;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #e8f0fe;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 90px;
            }

            .sidebar .logo-text,
            .sidebar .nav-item span {
                display: none;
            }

            .main-content {
                margin-left: 90px;
            }

            .nav-item {
                justify-content: center;
                padding: 14px 0;
            }

            .nav-item i {
                width: auto;
                font-size: 22px;
            }

            .logo-area {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-file-signature"></i>
                </div>
                <div class="logo-text">
                    <h2>智链·合同</h2>
                    <p>物流合同管理</p>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-item active">
                <i class="fas fa-chart-pie"></i>
                <span>数据仪表盘</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-file-contract"></i>
                <span>合同管理</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-truck"></i>
                <span>物流跟踪</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-users"></i>
                <span>客户管理</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-file-invoice"></i>
                <span>财务对账</span>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </div>
            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-bar">
            <div class="page-title">
                <h1>
                    <i class="fas fa-chart-line"></i>
                    数据仪表盘
                </h1>
            </div>

            <div class="user-profile">
                <div class="notification-badge">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="notifyBadge" style="display:none;">0</span>
                </div>

                <div class="user-info" id="userInfo">
                    <div class="avatar" id="userAvatar">管</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">加载中...</div>
                        <div class="user-role" id="userRole">管理员</div>
                    </div>
                    <i class="fas fa-chevron-down" style="color: #2d6da0; font-size: 14px;"></i>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-file-contract"></i></div>
                <div class="stat-info">
                    <h3>总合同数</h3>
                    <div class="stat-number" id="statTotalContracts">--</div>
                    <div class="stat-trend" id="statTotalTrend" style="display:none;"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-info">
                    <h3>进行中</h3>
                    <div class="stat-number" id="statActiveContracts">--</div>
                    <div class="stat-trend" id="statActiveTrend" style="display:none;"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <h3>已完成</h3>
                    <div class="stat-number" id="statCompletedContracts">--</div>
                    <div class="stat-trend" id="statCompletedTrend" style="display:none;"></div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-info">
                    <h3>即将到期</h3>
                    <div class="stat-number" id="statExpiringContracts">--</div>
                    <div class="stat-trend" id="statExpiringHint" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <!-- 合同趋势图 -->
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-line" style="margin-right: 8px; color: #2d6da0;"></i>合同签署趋势</h3>
                    <select id="trendPeriod">
                        <option value="7">最近7天</option>
                        <option value="30" selected>最近30天</option>
                        <option value="90">最近90天</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- 合同状态分布 -->
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-pie" style="margin-right: 8px; color: #2d6da0;"></i>合同状态分布</h3>
                </div>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 待办事项和最近合同两列布局 -->
        <div class="charts-row">
            <!-- 待办事项 -->
            <div class="tasks-card">
                <div class="tasks-header">
                    <h3><i class="fas fa-tasks" style="margin-right: 8px; color: #2d6da0;"></i>待办事项</h3>
                    <a href="#" class="view-all" id="taskViewAll" style="display:none;">查看全部 <i class="fas fa-arrow-right"></i></a>
                </div>

                <!-- ✅ 后续用真实数据渲染到这里 -->
                <div id="taskList"></div>

                <!-- ✅ 空状态 -->
                <div id="taskEmptyHint" style="padding: 20px 0; text-align: center; color:#6b7b8f;">
                    暂无待办事项
                </div>
            </div>

            <!-- 快速操作卡片 -->
            <div class="chart-card" style="display: flex; flex-direction: column;">
                <div class="chart-header">
                    <h3><i class="fas fa-bolt" style="margin-right: 8px; color: #2d6da0;"></i>快速操作</h3>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                    <div style="background: #f0f7ff; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;">
                        <i class="fas fa-file-upload" style="font-size: 32px; color: #2d6da0; margin-bottom: 10px;"></i>
                        <div style="font-weight: 600; color: #1a4b75;">上传合同</div>
                    </div>
                    <div style="background: #f0f7ff; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;">
                        <i class="fas fa-file-signature" style="font-size: 32px; color: #2d6da0; margin-bottom: 10px;"></i>
                        <div style="font-weight: 600; color: #1a4b75;">新建合同</div>
                    </div>
                    <div style="background: #f0f7ff; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;">
                        <i class="fas fa-search" style="font-size: 32px; color: #2d6da0; margin-bottom: 10px;"></i>
                        <div style="font-weight: 600; color: #1a4b75;">合同查询</div>
                    </div>
                    <div style="background: #f0f7ff; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;">
                        <i class="fas fa-file-pdf" style="font-size: 32px; color: #2d6da0; margin-bottom: 10px;"></i>
                        <div style="font-weight: 600; color: #1a4b75;">生成报表</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最近合同列表 -->
        <div class="recent-contracts">
            <div class="tasks-header" style="margin-bottom: 20px;">
                <h3><i class="fas fa-history" style="margin-right: 8px; color: #2d6da0;"></i>最近合同</h3>
                <a href="#" class="view-all" id="recentViewAll" style="display:none;">
                    查看全部 <i class="fas fa-arrow-right"></i>
                </a>="view-all">查看全部 <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>合同编号</th>
                        <th>合同名称</th>
                        <th>合作方</th>
                        <th>签署日期</th>
                        <th>到期日期</th>
                        <th>金额(万元)</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="recentContractTbody">

                    <!--  后续用真实数据渲染 -->

                    </tbody>
                </table>
                <div id="recentContractEmptyHint"
                     style="padding: 20px 0; text-align: center; color: #6b7b8f;">
                    暂无最近合同数据
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // ========== 初始化用户信息 ==========
    function loadUserInfo() {
  try {
    const userInfoStr = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
    if (!userInfoStr) {
      // 未登录：回登录页
      window.location.href = '/auth/login.html';
      return;
    }

    const userInfo = JSON.parse(userInfoStr);
    document.getElementById('userName').textContent = userInfo.username || '用户';

    const roleMap = { admin:'超级管理员', ADMIN:'系统管理员', user:'普通用户', manager:'合同经理' };
    const rawRole = (userInfo.role || '').toString();
    document.getElementById('userRole').textContent =
      roleMap[rawRole] || roleMap[rawRole.toUpperCase()] || rawRole || '普通用户';

    document.getElementById('userAvatar').textContent =
      (userInfo.username || '用户').charAt(0).toUpperCase();
  } catch (e) {
    console.error('加载用户信息失败:', e);
    window.location.href = '/auth/login.html';
  }
}

    // ========== 初始化图表 ==========
    function initCharts() {
  // 趋势图（空数据）
  const ctx1 = document.getElementById('trendChart').getContext('2d');

    // ========== 待办事项交互 ==========
    function initTasks() {
  document.querySelectorAll('.task-check').forEach(checkbox => {
    checkbox.addEventListener('click', function() {
      this.classList.toggle('checked');
      const taskItem = this.closest('.task-item');
      const taskTitle = taskItem?.querySelector('.task-title')?.textContent || '';
      console.log('任务状态更新:', taskTitle, this.classList.contains('checked') ? '已完成' : '未完成');
    });
  });
}
    // ========== 退出登录 ==========
    function logout() {
        // 清除存储的用户信息
        localStorage.removeItem('token');
        localStorage.removeItem('userInfo');
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('userInfo');

        // 跳转到登录页
        window.location.href = '/auth/login.html';
    }

    // ========== 初始化页面 ==========
    document.addEventListener('DOMContentLoaded', function() {
        loadUserInfo();
        initCharts();

        // 监听时间段变化
        document.getElementById('trendPeriod').addEventListener('change', function(e) {
          console.log('切换时间段:', e.target.value);
        });
    });
</script>
