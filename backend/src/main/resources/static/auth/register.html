<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · 智能物流合同管理系统</title>

    <!-- 引入字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ========== 全局重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            /* 浅蓝色渐变背景 - 与登录页保持一致 */
            background: linear-gradient(145deg, #e6f0fa 0%, #d1e3f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 极简背景装饰 */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(100, 150, 220, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 150, 220, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* 轻微光晕 */
        .glow-orbit {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120, 180, 255, 0.1) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            z-index: 0;
        }

        .glow-orbit-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(150, 200, 255, 0.08) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            z-index: 0;
        }

        /* ========== 注册卡片 ========== */
        .register-card {
            width: 100%;
            max-width: 1500px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -15px rgba(60, 110, 150, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            padding: 150px 150px;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .register-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px -15px rgba(50, 100, 150, 0.4);
        }

        /* ========== 品牌区域 ========== */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-box {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1a4b75, #2d6da0);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px -8px rgba(30, 90, 140, 0.4);
            position: relative;
            overflow: hidden;
        }

        .logo-circle i {
            font-size: 36px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 2;
        }

        .logo-circle::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
            transform: rotate(25deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(25deg); }
            20% { transform: translateX(100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }

        .brand h1 {
            font-size: 36px;
            font-weight: 700;
            color: #154979;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand .sub {
            font-size: 24px;
            color: #4073a3;
        }

        /* ========== 表单 ========== */
        .form-row {
            display: flex;
            gap: 24px;
            margin-bottom: 30px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 20px;
        }

        .form-group.full-width {
            width: 100%;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e4a72;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .form-group label i {
            margin-right: 6px;
            color: #2d6da0;
        }

        .input-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field i {
            position: absolute;
            left: 16px;
            color: #7c9ec0;
            font-size: 16px;
            transition: color 0.2s;
        }

        .input-field input,
        .input-field select {
            width: 100%;
            padding: 24px 24px 24px 60px;
            border: 2px solid #d3e2f2;
            border-radius: 18px;
            font-size: 18px;
            background: white;
            transition: all 0.25s ease;
            color: #152b40;
            font-weight: 500;
        }

        .input-field select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c9ec0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .input-field input:focus,
        .input-field select:focus {
            outline: none;
            border-color: #2d6da0;
            box-shadow: 0 0 0 4px rgba(45, 109, 160, 0.1);
        }

        .input-field input:focus + i,
        .input-field select:focus + i {
            color: #2d6da0;
        }

        .input-field input::placeholder {
            color: #abc0d4;
            font-weight: 400;
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0eaf5;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-text {
            font-size: 18px;
            margin-top: 8px;
            text-align: right;
            color: #6b8cac;
        }

        /* 协议勾选 */
        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 24px 0;
            background: #f0f7ff;
            padding: 16px;
            border-radius: 16px;
        }

        .agreement input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2d6da0;
            margin-top: 2px;
            cursor: pointer;
        }

        .agreement label {
            font-size: 14px;
            color: #1e4a72;
            line-height: 1.5;
            cursor: pointer;
        }

        .agreement a {
            color: #2d6da0;
            font-weight: 600;
            text-decoration: none;
        }

        .agreement a:hover {
            text-decoration: underline;
        }

        /* ========== 注册按钮 ========== */
        .register-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(105deg, #1a4b75, #2d6da0);
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 20px -8px rgba(45, 109, 160, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .register-btn i {
            font-size: 20px;
            transition: transform 0.2s;
        }

        .register-btn:hover {
            background: linear-gradient(105deg, #1f5885, #347bb3);
            transform: scale(1.02);
            box-shadow: 0 16px 25px -8px #1f5885;
        }

        .register-btn:hover i {
            transform: translateX(5px);
        }

        .register-btn:active {
            transform: scale(0.98);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 按钮加载状态 */
        .register-btn.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .register-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== 登录入口 ========== */
        .login-section {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px dashed #b8d0e8;
        }

        .login-section p {
            color: #3a6990;
            font-size: 15px;
        }

        .login-section a {
            color: #2d6da0;
            font-weight: 700;
            text-decoration: none;
            margin-left: 8px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .login-section a:hover {
            border-bottom-color: #2d6da0;
        }

        /* ========== 错误/成功提示 ========== */
        .alert {
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        .alert.error {
            background: #ffefef;
            border-left: 5px solid #d14545;
            color: #a82b2b;
        }

        .alert.success {
            background: #e6f7e6;
            border-left: 5px solid #2e7d32;
            color: #1e5a22;
        }

        .alert i {
            font-size: 22px;
        }

        .alert.error i {
            color: #d14545;
        }

        .alert.success i {
            color: #2e7d32;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 字段验证提示 */
        .field-hint {
            font-size: 18px;
            color: #6b8cac;
            margin-top: 10px;
            padding-left: 20px;
        }

        .field-hint i {
            margin-right: 8px;
            font-size: 16px;
        }

        .field-hint.valid {
            color: #2e7d32;
        }

        .field-hint.invalid {
            color: #d14545;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .register-card {
                margin: 20px;
                padding: 32px 24px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .brand h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<!-- 背景装饰 -->
<div class="grid-bg"></div>
<div class="glow-orbit"></div>
<div class="glow-orbit-2"></div>

<!-- 注册卡片 -->
<div class="register-card">
    <!-- 品牌标识 -->
    <div class="brand">
        <div class="logo-box">
            <div class="logo-circle">
                <i class="fas fa-user-plus"></i>
            </div>
        </div>
        <h1>创建新账号</h1>
        <div class="sub">加入智能物流合同管理系统</div>
    </div>

    <!-- 提示容器 (默认隐藏) -->
    <div id="alertContainer" style="display: none;"></div>

    <!-- 注册表单 -->
    <form id="registerForm" onsubmit="handleRegister(event)">
        <!-- 用户名/账号 (必填) -->
        <div class="form-group full-width">
            <label for="username"><i class="fas fa-user"></i>账号 <span style="color: #d14545;">*</span></label>
            <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="请输入账号，用于登录" value="" autocomplete="off">
            </div>
            <div class="field-hint" id="usernameHint">
                <i class="fas fa-info-circle"></i> 4-20位字母、数字或下划线
            </div>
        </div>

        <!-- 密码和确认密码 -->
        <div class="form-row">
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i>密码 <span style="color: #d14545;">*</span></label>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="请输入密码">
                    <i class="fas fa-eye-slash toggle-pwd" id="togglePassword" onclick="togglePasswordVisibility('password', this)"></i>
                </div>
                <!-- 密码强度条 -->
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">请输入密码</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-check-circle"></i>确认密码 <span style="color: #d14545;">*</span></label>
                <div class="input-field">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码">
                    <i class="fas fa-eye-slash toggle-pwd" id="toggleConfirmPassword" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
                </div>
                <div class="field-hint" id="confirmHint"></div>
            </div>
        </div>

        <!-- 个人信息 -->
        <div class="form-row">
            <div class="form-group">
                <label for="realName"><i class="fas fa-id-card"></i>真实姓名</label>
                <div class="input-field">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="realName" name="realName" placeholder="请输入真实姓名">
                </div>
            </div>

            <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i>手机号码</label>
                <div class="input-field">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" name="phone" placeholder="请输入手机号">
                </div>
            </div>
        </div>

        <!-- 公司信息 (可选) -->
        <div class="form-row">
            <div class="form-group">
                <label for="company"><i class="fas fa-building"></i>公司名称</label>
                <div class="input-field">
                    <i class="fas fa-building"></i>
                    <input type="text" id="company" name="company" placeholder="选填">
                </div>
            </div>

            <div class="form-group">
                <label for="department"><i class="fas fa-users"></i>部门</label>
                <div class="input-field">
                    <i class="fas fa-users"></i>
                    <input type="text" id="department" name="department" placeholder="选填">
                </div>
            </div>
        </div>

        <!-- 角色分配 (符合 F-004 默认角色分配) -->
        <div class="form-group full-width">
            <label><i class="fas fa-user-tag"></i>角色</label>
            <div class="input-field">
                <i class="fas fa-user-tag"></i>
                <select id="role" disabled>
                    <option value="user" selected>普通用户 (默认)</option>
                    <option value="admin" disabled>系统管理员 (不可选)</option>
                </select>
            </div>
            <div class="field-hint">
                <i class="fas fa-info-circle"></i> 注册后自动分配普通用户权限，管理员账号由系统预置
            </div>
        </div>

        <!-- 用户协议 -->
        <div class="agreement">
            <input type="checkbox" id="agreeTerms" checked>
            <label for="agreeTerms">
                我已阅读并同意 <a href="/terms.html" target="_blank">《用户服务协议》</a> 和
                <a href="/privacy.html" target="_blank">《隐私政策》</a>
            </label>
        </div>

        <!-- 注册按钮 -->
        <button type="submit" class="register-btn" id="registerBtn">
            <span>注 册</span>
            <i class="fas fa-arrow-right"></i>
        </button>

        <!-- 登录入口 -->
        <div class="login-section">
            <p>已有账号？<a href="/auth/login.html"><i class="fas fa-sign-in-alt" style="margin-right: 4px;"></i>立即登录</a></p>
        </div>
    </form>
</div>

<!-- JavaScript -->
<script>
    // ========== 工具函数 ==========

    // 切换密码可见性
    function togglePasswordVisibility(inputId, iconElement) {
        const input = document.getElementById(inputId);

        if (input.type === 'password') {
            input.type = 'text';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        } else {
            input.type = 'password';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        }
    }

    // 显示提示信息
    function showAlert(type, message) {
        const container = document.getElementById('alertContainer');
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';

        container.innerHTML = `
            <div class="alert ${type}">
                <i class="fas ${icon}"></i>
                <span>${message}</span>
            </div>
        `;
        container.style.display = 'block';

        // 自动滚动到顶部
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 隐藏提示
    function hideAlert() {
        document.getElementById('alertContainer').style.display = 'none';
    }

    // 设置加载状态
    function setLoading(isLoading) {
        const registerBtn = document.getElementById('registerBtn');
        if (isLoading) {
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner"></i> 注册中...';
        } else {
            registerBtn.classList.remove('loading');
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<span>注 册</span><i class="fas fa-arrow-right"></i>';
        }
    }

    // ========== 实时验证函数 ==========

    // 验证用户名
    function validateUsername(username) {
        const hint = document.getElementById('usernameHint');
        const regex = /^[a-zA-Z0-9_]{4,20}$/;

        if (!username) {
            hint.innerHTML = '<i class="fas fa-info-circle"></i> 请输入账号';
            hint.className = 'field-hint';
            return false;
        }

        if (regex.test(username)) {
            hint.innerHTML = '<i class="fas fa-check-circle"></i> 账号可用';
            hint.className = 'field-hint valid';
            return true;
        } else {
            hint.innerHTML = '<i class="fas fa-exclamation-circle"></i> 4-20位字母、数字或下划线';
            hint.className = 'field-hint invalid';
            return false;
        }
    }

    // 计算密码强度
    function checkPasswordStrength(password) {
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');

        if (!password) {
            bar.style.width = '0';
            bar.style.backgroundColor = '#e0eaf5';
            text.innerHTML = '请输入密码';
            return 0;
        }

        let strength = 0;

        // 长度检查
        if (password.length >= 8) strength += 1;
        if (password.length >= 12) strength += 1;

        // 包含数字
        if (/\d/.test(password)) strength += 1;

        // 包含小写字母
        if (/[a-z]/.test(password)) strength += 1;

        // 包含大写字母
        if (/[A-Z]/.test(password)) strength += 1;

        // 包含特殊字符
        if (/[^a-zA-Z0-9]/.test(password)) strength += 1;

        // 设置颜色和文字
        if (strength <= 2) {
            bar.style.width = '25%';
            bar.style.backgroundColor = '#d14545';
            text.innerHTML = '弱';
        } else if (strength <= 4) {
            bar.style.width = '60%';
            bar.style.backgroundColor = '#f9a825';
            text.innerHTML = '中';
        } else {
            bar.style.width = '100%';
            bar.style.backgroundColor = '#2e7d32';
            text.innerHTML = '强';
        }

        return strength;
    }

    // 验证密码
    function validatePassword(password) {
        return password && password.length >= 6;
    }

    // 验证确认密码
    function validateConfirm(password, confirm) {
        const hint = document.getElementById('confirmHint');

        if (!confirm) {
            hint.innerHTML = '<i class="fas fa-info-circle"></i> 请再次输入密码';
            hint.className = 'field-hint';
            return false;
        }

        if (password === confirm) {
            hint.innerHTML = '<i class="fas fa-check-circle"></i> 密码一致';
            hint.className = 'field-hint valid';
            return true;
        } else {
            hint.innerHTML = '<i class="fas fa-exclamation-circle"></i> 两次密码不一致';
            hint.className = 'field-hint invalid';
            return false;
        }
    }

    // 验证手机号
    function validatePhone(phone) {
        if (!phone) return true; // 可选字段
        const regex = /^1[3-9]\d{9}$/;
        return regex.test(phone);
    }

    // ========== 事件监听 ==========

    // 用户名实时验证
    document.getElementById('username').addEventListener('input', function(e) {
        validateUsername(e.target.value);
    });

    // 密码实时验证和强度计算
    document.getElementById('password').addEventListener('input', function(e) {
        const password = e.target.value;
        checkPasswordStrength(password);

        // 同时验证确认密码
        const confirm = document.getElementById('confirmPassword').value;
        validateConfirm(password, confirm);
    });

    // 确认密码实时验证
    document.getElementById('confirmPassword').addEventListener('input', function(e) {
        const password = document.getElementById('password').value;
        validateConfirm(password, e.target.value);
    });

    // 手机号验证
    document.getElementById('phone').addEventListener('input', function(e) {
        // 实时验证可以不做严格提示，只在提交时检查
    });

    // ========== 注册处理 ==========
async function handleRegister(event) {
  event.preventDefault();
  hideAlert();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const phone = document.getElementById('phone').value.trim();
  const agreeTerms = document.getElementById('agreeTerms').checked;

  // 账号校验
  if (!validateUsername(username)) {
    showAlert('error', '请输入有效的账号（4-20位字母、数字或下划线）');
    document.getElementById('username').focus();
    return;
  }

  // 密码校验
  if (!password) {
    showAlert('error', '请输入密码');
    document.getElementById('password').focus();
    return;
  }
  if (password.length < 6) {
    showAlert('error', '密码长度不能少于6位');
    document.getElementById('password').focus();
    return;
  }

  // 确认密码校验
  if (!validateConfirm(password, confirmPassword)) {
    showAlert('error', '两次输入的密码不一致');
    document.getElementById('confirmPassword').focus();
    return;
  }

  // 手机号校验（可选）
  if (phone && !validatePhone(phone)) {
    showAlert('error', '请输入有效的手机号码');
    document.getElementById('phone').focus();
    return;
  }

  // 协议校验
  if (!agreeTerms) {
    showAlert('error', '请阅读并同意用户协议');
    return;
  }

  setLoading(true);

  try {
    const response = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username,
        password
      })
    });

    const text = await response.text();

    if (response.ok) {
      showAlert('success', '注册成功！3秒后跳转到登录页...');
      document.getElementById('registerForm').reset();

      setTimeout(() => {
        window.location.href = '/auth/login.html';
      }, 3000);
    } else {
      showAlert('error', text || '注册失败，请稍后重试');
      setLoading(false);
    }
  } catch (error) {
    console.error('注册错误:', error);
    showAlert('error', '网络错误，请检查网络连接后重试');
    setLoading(false);
  }
}
</script>
</body>
</html>
