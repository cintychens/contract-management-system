<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台 · 智能物流合同管理系统</title>

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Chart.js 用于图表展示 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- 管理员页面样式 -->
    <link rel="stylesheet" href="./admin.css">
</head>
<body>
<div class="dashboard-container">
    <!-- 侧边栏导航（管理员专属） -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h2>智链·合同</h2>
                    <p>管理控制台</p>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-section-title">核心管理</div>

            <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard', this)">
                <i class="fas fa-chart-pie"></i>
                <span>数据总览</span>
            </div>

            <div class="nav-item" data-tab="users" onclick="switchTab('users', this)">
                <i class="fas fa-users-cog"></i>
                <span>用户管理</span>
            </div>

            <div class="nav-item" data-tab="templates" onclick="switchTab('templates', this)">
                <i class="fas fa-file-alt"></i>
                <span>合同模板维护</span>
            </div>

            <div class="nav-item" data-tab="dictionary" onclick="switchTab('dictionary', this)">
                <i class="fas fa-book"></i>
                <span>字段字典管理</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-section-title">系统监控</div>

            <div class="nav-item" data-tab="logs" onclick="switchTab('logs', this)">
                <i class="fas fa-history"></i>
                <span>操作日志</span>
            </div>

            <div class="nav-item" data-tab="audit" onclick="switchTab('audit', this)">
                <i class="fas fa-shield-alt"></i>
                <span>审计记录</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-section-title">系统配置</div>

            <div class="nav-item" data-tab="parameters" onclick="switchTab('parameters', this)">
                <i class="fas fa-sliders-h"></i>
                <span>基础参数</span>
            </div>

            <div class="nav-item" data-tab="backup" onclick="switchTab('backup', this)">
                <i class="fas fa-database"></i>
                <span>数据维护</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-bar">
            <div class="page-title">
                <h1>
                    <i class="fas fa-crown"></i>
                    管理员控制台
                </h1>
            </div>

            <div class="user-profile">
                <div class="notification-badge">
                    <i class="fas fa-bell"></i>
                    <span class="badge">5</span>
                </div>

                <div class="user-info" id="userInfo">
                    <div class="avatar" id="userAvatar">管</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">系统管理员</div>
                        <div class="user-role" id="userRole">超级管理员</div>
                    </div>
                    <i class="fas fa-chevron-down" style="color: #ffd700;"></i>
                </div>
            </div>
        </div>

        <!-- 动态内容区域 -->
        <div id="content-area"></div>
    </main>
</div>

<!-- 用户管理模态框 -->
<div class="modal" id="userModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> 编辑用户</h3>
            <span class="close-modal" onclick="closeModal('userModal')">&times;</span>
        </div>
        <form id="userForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="editUsername" readonly>
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="editFullName">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="editRole">
                    <option value="user">普通用户</option>
                    <option value="admin">系统管理员</option>
                </select>
            </div>
            <div class="form-group">
                <label>状态</label>
                <select id="editStatus">
                    <option value="active">启用</option>
                    <option value="disabled">禁用</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="editRemark" rows="4" placeholder="例如：部门、使用情况、注意事项等"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeModal('userModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 模板管理模态框 -->
<div class="modal" id="templateModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-alt"></i> 编辑模板</h3>
            <span class="close-modal" onclick="closeModal('templateModal')">&times;</span>
        </div>
        <form id="templateForm">
            <div class="form-group">
                <label>模板名称</label>
                <input type="text" id="editTemplateName" required>
            </div>
            <div class="form-group">
                <label>合同类型</label>
                <select id="editContractType">
                    <option value="transport">运输合同</option>
                    <option value="warehouse">仓储合同</option>
                    <option value="supply">供应链协议</option>
                    <option value="distribution">配送服务合同</option>
                    <option value="outsourcing">物流外包合同</option>
                </select>
            </div>
            <div class="form-group">
                <label>模板内容</label>
                <textarea id="editTemplateContent" rows="8" required></textarea>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="editTemplateRemark" rows="3" placeholder="请输入模板说明或备注"></textarea>
            </div>

            <div class="form-group">
                <label>模板附件（支持 PDF / Word）</label>
                <input
                        type="file"
                        id="templateFile"
                        accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                >

                <div id="templateFileHint" style="margin-top:10px; font-size:13px; color:#6b7b8f;">
                    仅支持：.pdf / .doc / .docx（建议 ≤ 20MB）
                </div>

                <div id="templateFilePreview" style="margin-top:10px; display:none; padding:12px; border:1px dashed #ffd700; border-radius:16px; background:#fffaf0;">
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                        <div>
                            <div style="font-weight:700; color:#0a1a2b;" id="templateFileName">-</div>
                            <div style="font-size:12px; color:#6b7b8f;" id="templateFileMeta">-</div>
                        </div>
                        <button type="button" class="btn-outline" onclick="clearTemplateFile()" style="padding:8px 14px;">
                            移除
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>状态</label>
                <select id="editTemplateStatus">
                    <option value="active">启用</option>
                    <option value="disabled">禁用</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeModal('templateModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script src="./admin-api.js"></script>
<script src="./admin-pages.js"></script>
<script src="./admin.js"></script>
</body>
</html>
