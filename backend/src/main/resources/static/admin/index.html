<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员控制台 · 智能物流合同管理系统</title>

    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Chart.js 用于图表展示 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            color: #1e293b;
        }

        /* ========== 布局 ========== */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* ========== 侧边栏（管理员专属样式） ========== */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a1a2b 0%, #0e2a3f 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 4px 0 20px rgba(0, 20, 40, 0.3);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
            border-right: 1px solid rgba(255, 215, 0, 0.2);
        }

        .sidebar-header {
            padding: 0 24px 30px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0a1a2b;
            box-shadow: 0 8px 16px rgba(255, 215, 0, 0.3);
        }

        .logo-text h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            color: #ffd700;
        }

        .logo-text p {
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 0.5px;
            color: #a0b8cc;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.25s;
            margin-bottom: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 22px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, #ffd700, #ffa500);
            color: #0a1a2b;
            box-shadow: 0 8px 16px rgba(255, 215, 0, 0.3);
        }

        .nav-item.active i {
            color: #0a1a2b;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255, 215, 0, 0.2);
            margin: 20px 0;
        }

        .nav-section-title {
            padding: 10px 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffd700;
            opacity: 0.7;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 35px;
            background: #f0f4f8;
        }

        /* ========== 顶部导航 ========== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .page-title h1 {
            font-size: 24px;
            color: #0a1a2b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h1 i {
            color: #ffd700;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(255, 215, 0, 0.3);
        }

        .admin-badge {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #0a1a2b;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 22px;
            color: #2d6da0;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 6px;
            border-radius: 30px;
            min-width: 18px;
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 40px;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-info:hover {
            background: #fff3cd;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a1a2b;
            font-weight: 700;
            font-size: 18px;
        }

        .user-details {
            line-height: 1.4;
        }

        .user-name {
            font-weight: 700;
            color: #0a1a2b;
        }

        .user-role {
            font-size: 12px;
            color: #ffd700;
            font-weight: 600;
        }

        /* ========== 系统状态卡片 ========== */
        .system-status {
            background: linear-gradient(145deg, #0a1a2b, #1a3347);
            color: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .system-status h2 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffd700;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .status-item {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .status-item i {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .status-value {
            font-size: 28px;
            font-weight: 700;
            margin: 10px 0 5px;
            color: #ffd700;
        }

        .status-label {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 8px;
            margin-right: 5px;
        }

        .indicator-green {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .indicator-red {
            background: #ef4444;
        }

        .indicator-yellow {
            background: #f59e0b;
        }

        /* ========== 快捷操作卡片 ========== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            margin-bottom: 30px;
        }

        .action-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .action-card i {
            font-size: 40px;
            color: #ffd700;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        .action-card h3 {
            font-size: 18px;
            color: #0a1a2b;
            margin-bottom: 8px;
        }

        .action-card p {
            font-size: 13px;
            color: #6b7b8f;
        }

        /* ========== 内容区域 ========== */
        .content-section {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-header h2 {
            font-size: 20px;
            color: #0a1a2b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header h2 i {
            color: #ffd700;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #0a1a2b;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 215, 0, 0.4);
        }

        .btn-outline {
            background: white;
            border: 1px solid #ffd700;
            color: #0a1a2b;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: #fff3cd;
            border-color: #ffa500;
        }

        /* ========== 表格样式 ========== */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 12px;
            color: #4f6f8f;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid #ffd700;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #eef2f6;
            color: #2d4059;
        }

        .user-remark-cell {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #e3f7ec;
            color: #10b981;
        }

        .status-pending {
            background: #fff4e0;
            color: #f59e0b;
        }

        .status-expired {
            background: #fee9e9;
            color: #dc3545;
        }

        .status-disabled {
            background: #e9ecef;
            color: #6c757d;
        }

        .admin-badge-small {
            background: #ffd700;
            color: #0a1a2b;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .action-btn {
            background: none;
            border: none;
            color: #ffd700;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #fff3cd;
            color: #ffa500;
        }

        .action-btn.danger {
            color: #dc3545;
        }

        .action-btn.danger:hover {
            background: #fee9e9;
        }

        /* ========== 标签页 ========== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: 600;
            color: #6b7b8f;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #fff3cd;
            color: #0a1a2b;
        }

        .tab.active {
            background: #ffd700;
            color: #0a1a2b;
        }

        /* ========== 搜索和筛选 ========== */
        .search-box {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border-radius: 30px;
            padding: 5px 15px;
            border: 1px solid #eef2f6;
        }

        .search-box input {
            border: none;
            background: none;
            padding: 10px;
            width: 250px;
            outline: none;
        }

        .search-box i {
            color: #ffd700;
        }

        /* ========== 统计卡片 ========== */
        .stats-mini-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-mini-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stat-mini-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 1400px) {
            .status-grid, .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 90px;
            }

            .sidebar .logo-text,
            .sidebar .nav-item span,
            .sidebar .nav-section-title {
                display: none;
            }

            .main-content {
                margin-left: 90px;
            }

            .nav-item {
                justify-content: center;
                padding: 14px 0;
            }

            .nav-item i {
                width: auto;
                font-size: 22px;
            }

            .logo-area {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .status-grid, .quick-actions {
                grid-template-columns: 1fr;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .main-content {
                padding: 20px;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }

        /* ========== 模态框 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid #ffd700;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #0a1a2b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: #6b7b8f;
        }

        .close-modal:hover {
            color: #dc3545;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a1a2b;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eef2f6;
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- 侧边栏导航（管理员专属） -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">
                    <h2>智链·合同</h2>
                    <p>管理控制台</p>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-section-title">核心管理</div>

            <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard', this)">
                <i class="fas fa-chart-pie"></i>
                <span>数据总览</span>
            </div>

            <div class="nav-item" data-tab="users" onclick="switchTab('users', this)">
                <i class="fas fa-users-cog"></i>
                <span>用户管理</span>
            </div>

            <div class="nav-item" data-tab="templates" onclick="switchTab('templates', this)">
                <i class="fas fa-file-alt"></i>
                <span>合同模板维护</span>
            </div>

            <div class="nav-item" data-tab="dictionary" onclick="switchTab('dictionary', this)">
                <i class="fas fa-book"></i>
                <span>字段字典管理</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-section-title">系统监控</div>

            <div class="nav-item" data-tab="logs" onclick="switchTab('logs', this)">
                <i class="fas fa-history"></i>
                <span>操作日志</span>
            </div>

            <div class="nav-item" data-tab="audit" onclick="switchTab('audit', this)">
                <i class="fas fa-shield-alt"></i>
                <span>审计记录</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-section-title">系统配置</div>

            <div class="nav-item" data-tab="parameters" onclick="switchTab('parameters', this)">
                <i class="fas fa-sliders-h"></i>
                <span>基础参数</span>
            </div>

            <div class="nav-item" data-tab="backup" onclick="switchTab('backup', this)">
                <i class="fas fa-database"></i>
                <span>数据维护</span>
            </div>

            <div class="nav-divider"></div>
            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-bar">
            <div class="page-title">
                <h1>
                    <i class="fas fa-crown"></i>
                    管理员控制台
                </h1>
            </div>

            <div class="user-profile">
                <div class="notification-badge">
                    <i class="fas fa-bell"></i>
                    <span class="badge">5</span>
                </div>

                <div class="user-info" id="userInfo">
                    <div class="avatar" id="userAvatar">管</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">系统管理员</div>
                        <div class="user-role" id="userRole">超级管理员</div>
                    </div>
                    <i class="fas fa-chevron-down" style="color: #ffd700;"></i>
                </div>
            </div>
        </div>

        <!-- 动态内容区域 - 通过JavaScript切换 -->
        <div id="content-area">
            <!-- 默认显示仪表盘 -->
        </div>
    </main>
</div>

<!-- 用户管理模态框 -->
<div class="modal" id="userModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> 编辑用户</h3>
            <span class="close-modal" onclick="closeModal('userModal')">&times;</span>
        </div>
        <form id="userForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="editUsername" readonly>
            </div>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="editFullName">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="editRole">
                    <option value="user">普通用户</option>
                    <option value="admin">系统管理员</option>
                </select>
            </div>
            <div class="form-group">
                <label>状态</label>
                <select id="editStatus">
                    <option value="active">启用</option>
                    <option value="disabled">禁用</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="editRemark" rows="4" placeholder="例如：部门、使用情况、注意事项等"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeModal('userModal')">取消</button>
                <button type="submit" class="btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 模板管理模态框 -->
<div class="modal" id="templateModal">

            <div class="form-group">
                <label>状态</label>
                <select id="editTemplateStatus">

                    <option value="disabled">禁用</option>

            <div class="modal-actions">
                <button type="button" class="btn-outline" onclick="closeModal('templateModal')">取消</button>

    // ========== 管理员信息加载 ==========
    function loadAdminInfo() {
  try {
    const userInfoStr = sessionStorage.getItem("userInfo");

    if (!userInfoStr) {
      window.location.href = "/auth/login.html";
      return;
    }

    const userInfo = JSON.parse(userInfoStr);

    const isAdmin = userInfo.roleCode === "ADMIN";

    document.getElementById("userName").textContent =
      userInfo.name || userInfo.fullName || userInfo.username || "系统管理员";

    document.getElementById("userRole").textContent =
      isAdmin ? "超级管理员" : "普通用户";

    const avatar = document.getElementById("userAvatar");
    avatar.textContent = (userInfo.username || "管").charAt(0).toUpperCase();

    if (!isAdmin) {
      window.location.href = "/dashboard/index.html";
    }
  } catch (e) {
    console.error("加载管理员信息失败:", e);
    window.location.href = "/auth/login.html";
  }
}

    // ========== 标签页切换 ==========
    function setActiveNavByTab(tabName) {
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    const target = document.querySelector(`.nav-item[data-tab="${tabName}"]`);
    if (target) target.classList.add('active');
}

function switchTab(tabName, el) {
    // 1) 更新导航激活状态（支持 this / 也支持程序调用）
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

    if (el && el.classList) {
        el.classList.add('active');
    } else {
        setActiveNavByTab(tabName);
    }

    // 2) 切换内容
    const contentArea = document.getElementById('content-area');
    switch (tabName) {
        case 'dashboard':
            contentArea.innerHTML = renderDashboard();
            loadDashboardData();
            break;
        case 'users':
            contentArea.innerHTML = renderUserManagement();
            initUsersPage();
            break;
        case 'templates':
            contentArea.innerHTML = renderTemplateManagement();
            initTemplatesPage();
            break;
        case 'dictionary':
            contentArea.innerHTML = renderDictionaryManagement();
            break;
        case 'logs':
            contentArea.innerHTML = renderOperationLogs();
            break;
        case 'audit':
            contentArea.innerHTML = renderAuditRecords();
            break;
        case 'parameters':
            contentArea.innerHTML = renderSystemParameters();
            break;
        case 'backup':
            contentArea.innerHTML = renderDataMaintenance();
            break;
    }
}
    // 退出
    function logout() {
  try {
    sessionStorage.removeItem("userInfo");
    sessionStorage.removeItem("isAdmin");
    sessionStorage.removeItem("token");

    window.location.href = "/auth/login.html";
  } catch (e) {
    console.error("logout error:", e);
    window.location.href = "/auth/login.html";
  }
}

  async function uploadTemplateFile(file) {
  const fd = new FormData();
  fd.append("file", file);

  const resp = await authFetch("/api/admin/templates/upload", {
    method: "POST",
    body: fd
  });

  if (!resp.ok) throw new Error(await resp.text());
  return await resp.json();
}

  async function loadDashboardData() {
    try {
      const resp = await authFetch("/api/admin/dashboard");
      if (!resp.ok) throw new Error("获取统计数据失败");

      const data = await resp.json();

      document.getElementById("dbStatus").textContent = data.dbAvailability + "%";
      document.getElementById("userCount").textContent = data.userCount;
      document.getElementById("contractCount").textContent = data.contractCount;
      document.getElementById("apiLatency").textContent = data.apiLatency + " ms";
    } catch (err) {
      console.error(err);
    }
  }

    // ✅ 允许的文件类型
  const ALLOWED_TEMPLATE_MIME = new Set([
    "application/pdf",
    "application/msword",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  ]);
  const ALLOWED_TEMPLATE_EXT = new Set(["pdf", "doc", "docx"]);
  const MAX_TEMPLATE_FILE_SIZE_MB = 20;

  function formatBytes(bytes) {
    if (bytes === 0) return "0 B";
    const k = 1024;
    const sizes = ["B", "KB", "MB", "GB"];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(2) + " " + sizes[i];
  }

  function getExt(filename) {
    const idx = filename.lastIndexOf(".");
    return idx >= 0 ? filename.slice(idx + 1).toLowerCase() : "";
  }

  function clearTemplateFile() {
    const input = document.getElementById("templateFile");
    const preview = document.getElementById("templateFilePreview");
    const nameEl = document.getElementById("templateFileName");
    const metaEl = document.getElementById("templateFileMeta");
    if (input) input.value = "";
    if (nameEl) nameEl.textContent = "-";
    if (metaEl) metaEl.textContent = "-";
    if (preview) preview.style.display = "none";
  }

  function handleTemplateFileChange() {
    const input = document.getElementById("templateFile");
    const preview = document.getElementById("templateFilePreview");
    const nameEl = document.getElementById("templateFileName");
    const metaEl = document.getElementById("templateFileMeta");

    if (!input || !input.files || input.files.length === 0) {
      clearTemplateFile();
      return;
    }

    const file = input.files[0];
    const ext = getExt(file.name);
    const sizeMB = file.size / (1024 * 1024);

    const mimeOk = ALLOWED_TEMPLATE_MIME.has(file.type);
    const extOk = ALLOWED_TEMPLATE_EXT.has(ext);

    if (!mimeOk && !extOk) {
      alert("只允许上传 PDF 或 Word（.pdf/.doc/.docx）");
      clearTemplateFile();
      return;
    }

    if (sizeMB > MAX_TEMPLATE_FILE_SIZE_MB) {
      alert(`文件过大，建议不超过 ${MAX_TEMPLATE_FILE_SIZE_MB}MB`);
      clearTemplateFile();
      return;
    }

    nameEl.textContent = file.name;
    metaEl.textContent = `${file.type || ext.toUpperCase()} · ${formatBytes(file.size)}`;
    preview.style.display = "block";
  }

// 如果你后端需要带 token，就用这个包装 fetch
function authFetch(url, options = {}) {
  const token = sessionStorage.getItem("token");
  const headers = new Headers(options.headers || {});
  if (token) headers.set("Authorization", "Bearer " + token);
  return fetch(url, { ...options, headers });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}
function escapeAttr(str) {
  // 用在 HTML 属性里的简单转义
  return escapeHtml(str).replaceAll("\n", " ");
}

        fileInfo = await uploadTemplateFile(file);
      } catch (err) {
        alert("附件上传失败：" + (err.message || err));
        return;
      }
    }

    const userInfo = JSON.parse(sessionStorage.getItem("userInfo") || "{}");

    const payload = {
      name,
      contractType,
      content,
      remark,
      status,
      updatedBy: userInfo.username || "admin",
      fileName: fileInfo?.fileName || null,
      fileObjectKey: fileInfo?.fileObjectKey || null
    };

    try {
      let resp;

      if (templatesState.editingId) {
        resp = await authFetch(`/api/admin/templates/${templatesState.editingId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } else {
        resp = await authFetch("/api/admin/templates", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || "保存失败");
      }

      alert("模板已保存");
      closeModal("templateModal");
      clearTemplateFile();
      await loadTemplatesTable();
      await loadTemplateStats();
    } catch (err) {
      console.error(err);
      alert("保存失败：" + (err.message || err));
    }
  });
}
    // 模态框点击外部关闭
    window.onclick = function (event) {
      if (event.target.classList.contains('modal')) {
        event.target.classList.remove('active');
      }
    };
  });
</script>
</body>
</html>
