<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同管理 · 智能物流合同管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f9ff;
            min-height: 100vh;
            color: #1e293b;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0b2b4a 0%, #123b5e 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 4px 0 20px rgba(0, 30, 60, 0.15);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #7ab7ff;
            backdrop-filter: blur(4px);
        }

        .logo-text h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .nav-item {

            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;

            margin-bottom: 6px;

            font-weight: 500;
        }

        .nav-item i {
            width: 22px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, #2d6da0, #1a4b75);
            color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);

        }

            background: #f5f9ff;
        }

        .top-bar {
            display: flex;

            margin-bottom: 30px;

        .page-title h1 {

            display: flex;

        }

        .page-title h1 i {

        }

        .user-profile {

            align-items: center;

        }

        .user-info {

            gap: 12px;

        .avatar {

            background: linear-gradient(145deg, #2d6da0, #1a4b75);
            border-radius: 40px;
            display: flex;

            justify-content: center;

            font-weight: 600;

        }

        .user-details {

        }

        .user-name {
            font-weight: 700;
            color: #1a4b75;
        }

        .user-role {

        .content-card {

            padding: 24px;

            border: 1px solid rgba(45, 109, 160, 0.1);
        }

        .toolbar {

            margin-bottom: 20px;

        }

        .toolbar-right {

            gap: 12px;

        }

            display: flex;
            align-items: center;
            background: #f8fbff;
            border: 1px solid #dbe7f3;
            border-radius: 30px;
            padding: 0 14px;
        }

        .search-box input {

            outline: none;
            background: transparent;
            padding: 10px 8px;
            width: 240px;
        }

        .search-box i { color: #2d6da0; }

        select {
            padding: 10px 14px;
            border-radius: 30px;
            border: 1px solid #dbe7f3;
            background: #f8fbff;
            outline: none;
            color: #1a4b75;
        }

        .btn-primary, .btn-outline {
            border: none;

        .btn-outline {

        .table-responsive { overflow-x: auto; }

        table {

        th {

            padding: 16px 12px;
            font-size: 14px;
            color: #4f6f8f;

        }

        td {

            color: #2d4059;
            vertical-align: middle;
        }

        .status-badge {

            background: #e3f7ec;

        .status-pending {
            background: #fff4e0;
            color: #f59e0b;
        }

        .status-expired {
            background: #fee9e9;
            color: #dc3545;
        }

        .action-btn {
            background: none;
            border: none;
            color: #2d6da0;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 8px;
            border-radius: 8px;
        }

        .action-btn:hover { background: #e8f0fe; }

        .pagination {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #6b7b8f;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pagination-actions {
            display: flex;
            gap: 10px;
        }

        .empty-hint {
            padding: 36px 0;
            text-align: center;
            color: #6b7b8f;
        }

        .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.modal.active {
    display: flex;
}

.modal-content {
    width: 100%;
    max-width: 900px;
    max-height: 85vh;
    background: #ffffff;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.modal-header h3 {
    font-size: 22px;
    color: #1a4b75;
    display: flex;
    align-items: center;
    gap: 10px;
}

.close-modal {
    font-size: 28px;
    cursor: pointer;
    color: #6b7b8f;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #1a4b75;
    font-weight: 600;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #dbe7f3;
    background: #f8fbff;
    outline: none;
    font-size: 14px;
    color: #1e293b;
}

.form-group textarea {
    resize: vertical;
    min-height: 180px;
}

.generate-fields-container {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px 18px;
    margin-top: 10px;
    margin-bottom: 18px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 6px;
}

.sticky-actions {
    position: sticky;
    bottom: 0;
    background: #ffffff;
    padding-top: 14px;
    margin-top: 16px;
    border-top: 1px solid #eef2f6;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 18px;
    flex-wrap: wrap;
}

        @media (max-width: 1024px) {
            .sidebar {
                width: 90px;
            }

            .sidebar .logo-text,
            .sidebar .nav-item span {
                display: none;
            }

            .main-content {
                margin-left: 90px;
            }

            .nav-item {
                justify-content: center;
                padding: 14px 0;
            }

            .nav-item i {
                width: auto;
                font-size: 22px;
            }

            .logo-area {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .modal {
                align-items: flex-start;
                padding: 12px;
            }

            .modal-content {
                max-height: 92vh;
                padding: 18px;
                border-radius: 18px;
                margin-top: 12px;
            }

            .generate-fields-container {
                grid-template-columns: 1fr;
                max-height: 300px;
            }
        }


        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box input {
                width: 160px;
            }
        }
    </style>
</head>
<body>

<div class="modal" id="generateContractModal">

<script>
    const state = {
        page: 1,
        size: 10,
        keyword: '',
        status: ''
    };

    function authFetch(url, options = {}) {
        const token = sessionStorage.getItem('token') || localStorage.getItem('token');
        const headers = new Headers(options.headers || {});
        if (token) headers.set('Authorization', 'Bearer ' + token);
        return fetch(url, { ...options, headers });
    }

    function showModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.classList.add('active');
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.classList.remove('active');
    }

    function escapeHtml(str) {
        return String(str ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDateTime(value) {
        if (!value) return '-';
        try {
            return value.replace('T', ' ').slice(0, 19);
        } catch {
            return value;
        }
    }

    function getStatusText(status) {
        const map = {
            DRAFT: '草稿',
            ACTIVE: '进行中',
            COMPLETED: '已完成',
            EXPIRED: '已到期',
            TERMINATED: '已终止',
            UPLOADED: '已上传'
        };
        return map[status] || status || '-';
    }

    function getStatusClass(status) {
        switch (status) {
            case 'ACTIVE':
            case 'COMPLETED':
                return 'status-active';
            case 'DRAFT':
            case 'UPLOADED':
                return 'status-pending';
            case 'EXPIRED':
            case 'TERMINATED':
                return 'status-expired';
            default:
                return 'status-pending';
        }
    }

    function getContractTypeText(type) {
    const map = {
        transport: '运输合同',
        warehouse: '仓储合同',
        supply: '供应链协议',
        distribution: '配送服务合同',
        outsourcing: '物流外包合同'
    };
    return map[type] || type || '-';
}

    function getVariableLabel(key) {
    const map = {

        // ========= 通用字段 =========
        title: '合同标题',

        partyB: '乙方',

        extraRequirements: '补充要求',
        servicePeriod: '服务期限',
        penaltyRate: '违约金比例',

        warehouseAddress: '仓储地址',

        outboundDate: '出库日期',

        paymentMethod: '付款方式',

        // ========= 供应链协议 =========

        // ========= 配送类 =========
        originWarehouse: '起运仓库',

        deliveryMode: '配送方式',
        deliveryTimeRequirement: '时效要求',
        singleWeightLimit: '单件重量限制',
        singleVolumeLimit: '单件体积限制',
        claimPeriod: '投诉索赔期限',
        pickupTimeLimit: '提货时限',
        storageFeeStandard: '保管费标准',
        deliveryTimeStandard: '配送时效',
        insuranceOption: '保险方式',

        // ========= 外包类 =========
        partyAAddress: '甲方地址',
        partyALegalPerson: '甲方法定代表人',
        partyAPhone: '甲方联系电话',
        partyBAddress: '乙方地址',
        partyBLegalPerson: '乙方法定代表人',

    return map[key] || key;
}

    function loadUserInfo() {
        try {
            const userInfoStr = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
            if (!userInfoStr) {
                window.location.href = '/auth/login.html';
                return;
            }
            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('userName').textContent = userInfo.username || '用户';
            document.getElementById('userAvatar').textContent = (userInfo.username || 'U').charAt(0).toUpperCase();

            const roleMap = {
                admin: '超级管理员',
                ADMIN: '系统管理员',
                user: '普通用户',
                USER: '普通用户',
                manager: '合同经理',
                MANAGER: '合同经理'
            };
            const rawRole = (userInfo.role || userInfo.roleCode || '').toString();
            document.getElementById('userRole').textContent =
                roleMap[rawRole] || roleMap[rawRole.toUpperCase()] || rawRole || '普通用户';
        } catch (e) {
            console.error(e);
            window.location.href = '/auth/login.html';
        }
    }

    async function loadContracts() {
        const tbody = document.getElementById('contractTableBody');
        const emptyHint = document.getElementById('contractEmptyHint');
        const pageInfo = document.getElementById('pageInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        tbody.innerHTML = `<tr><td colspan="7" style="padding:18px; color:#6b7b8f;">加载中...</td></tr>`;
        emptyHint.style.display = 'none';

        try {
            const qs = new URLSearchParams({
                page: String(state.page),
                size: String(state.size),
                keyword: state.keyword || '',
                status: state.status || ''
            });

            const resp = await authFetch(`/api/contracts?${qs.toString()}`);
            if (!resp.ok) throw new Error('获取合同列表失败');

            const result = await resp.json();
            if (result.code !== 200) throw new Error(result.message || '获取合同列表失败');

            const data = result.data || {};
            const records = data.records || [];
            const total = data.total ?? 0;
            const page = data.page ?? state.page;
            const size = data.size ?? state.size;
            const totalPages = data.totalPages ?? Math.ceil(total / size);

            pageInfo.textContent = `第 ${page} / ${totalPages || 1} 页 · 共 ${total} 条`;
            prevBtn.disabled = page <= 1;
            nextBtn.disabled = totalPages ? page >= totalPages : records.length < size;

            if (!records.length) {
                tbody.innerHTML = '';
                emptyHint.style.display = 'block';
                return;
            }

            tbody.innerHTML = records.map(contract => `
                <tr>
                    <td>${contract.contractId ?? '-'}</td>
                    <td>${escapeHtml(contract.contractNo || '-')}</td>
                    <td>${escapeHtml(contract.title || '-')}</td>
                    <td>${escapeHtml(getContractTypeText(contract.contractType))}</td>
                    <td>
                        <span class="status-badge ${getStatusClass(contract.status)}">
                            ${escapeHtml(getStatusText(contract.status))}
                        </span>
                    </td>
                    <td>${formatDateTime(contract.createdAt)}</td>
                    <td>
                        <button class="action-btn" title="查看详情" onclick="viewContract(${contract.contractId})">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error(e);
            tbody.innerHTML = `<tr><td colspan="7" style="padding:18px; color:#dc3545;">加载失败：${escapeHtml(e.message || e)}</td></tr>`;
        }
    }

    function viewContract(contractId) {
        window.location.href = `/contract/detail.html?id=${contractId}`;
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('userInfo');
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('userInfo');
        window.location.href = '/auth/login.html';
    }

    /* ===== 智能生成合同 ===== */

    async function openGenerateContractModal() {
        showModal('generateContractModal');
        await loadGenerateTemplateOptions();
    }

    async function loadGenerateTemplateOptions() {
    const select = document.getElementById('generateTemplateSelect');
    const fieldsBox = document.getElementById('generateFieldsContainer');
    const preview = document.getElementById('generatePreview');

    try {
        const resp = await authFetch('/api/templates/enabled');
        if (!resp.ok) {
            throw new Error(await resp.text());
        }

        const list = await resp.json();

        select.innerHTML = `
            <option value="">请选择模板</option>
            ${list.map(t => `
                <option value="${t.templateId}" data-contract-type="${escapeHtml(t.contractType || '')}">
                    ${escapeHtml(t.name)}${t.contractType ? `（${escapeHtml(t.contractType)}）` : ''}
                </option>
            `).join('')}
        `;

        if (fieldsBox) fieldsBox.innerHTML = '';
        if (preview) preview.value = '';

        select.onchange = async function () {
            await loadGenerateVariables(this.value);
        };
    } catch (e) {
        console.error(e);
        alert('加载模板失败：' + (e.message || e));
    }
}

    async function loadGenerateVariables(templateId) {
    const box = document.getElementById('generateFieldsContainer');

    if (!templateId) {
        box.innerHTML = '';
        return;
    }

    const textareaFields = new Set([
        'serviceScope',
        'serviceStandard',
        'feeStructure',
        'exceptionHandling',
        'breachLiability',
        'extraRequirements',
        'serviceContent',
        'specialRequirement'
    ]);

    try {
        const resp = await authFetch(`/api/templates/${templateId}/variables`);
        if (!resp.ok) throw new Error(await resp.text());

        const result = await resp.json();
        const vars = result.variables || [];

        if (!vars.length) {
            box.innerHTML = '<div style="color:#6b7b8f;">该模板暂无变量字段</div>';
            return;
        }

        box.innerHTML = vars.map(v => {
            const label = escapeHtml(getVariableLabel(v));
            const key = escapeHtml(v);

            if (textareaFields.has(v)) {
                return `
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>${label}</label>
                        <textarea class="generate-field" data-key="${key}" rows="4"></textarea>
                    </div>
                `;
            }

            return `
                <div class="form-group">
                    <label>${label}</label>
                    <input class="generate-field" data-key="${key}" type="text">
                </div>
            `;
        }).join('');
    } catch (e) {
        console.error(e);
        box.innerHTML = `<div style="color:#dc3545;">字段加载失败：${escapeHtml(e.message || e)}</div>`;
    }
}

    async function handleGenerateContract() {
        try {
            const templateId = document.getElementById('generateTemplateSelect').value;
            const title = document.getElementById('generateContractTitle').value.trim();

            if (!templateId) return alert('请选择模板');
            if (!title) return alert('请输入合同标题');

            const payload = { templateId: Number(templateId), title };

            document.querySelectorAll('.generate-field').forEach(input => {
                payload[input.dataset.key] = input.value.trim();
            });

            const resp = await authFetch('/api/contracts/generate-draft', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await resp.json();

            if (!resp.ok || result.code !== 200) {
                throw new Error(result.message || '生成失败');
            }

            document.getElementById('generatePreview').value =
                result.data?.draftContent || result.draftContent || '';

            alert('生成成功');
        } catch (e) {
            alert('生成失败：' + e.message);
        }
    }

    async function saveGeneratedContract() {
    try {
        const templateSelect = document.getElementById('generateTemplateSelect');
        const templateId = templateSelect.value;
        const selectedOption = templateSelect.options[templateSelect.selectedIndex];

        const title = document.getElementById('generateContractTitle').value.trim();
        const draftContent = document.getElementById('generatePreview').value.trim();
        const contractType = selectedOption?.dataset.contractType || '';

        if (!templateId) return alert('请选择模板');
        if (!title) return alert('请输入标题');
        if (!draftContent) return alert('请先生成草稿');
        if (!contractType) return alert('未获取到合同类型，请重新选择模板');

        const payload = {
            templateId: Number(templateId),
            title,
            contractType,
            draftContent
        };

        document.querySelectorAll('.generate-field').forEach(input => {
            payload[input.dataset.key] = input.value.trim();
        });

        const resp = await authFetch('/api/contracts/confirm-generated', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await resp.json();

        if (!resp.ok || (result.code && result.code !== 200)) {
            throw new Error(result.message || '保存失败');
        }

        alert('保存成功');
        closeModal('generateContractModal');
        loadContracts();
    } catch (e) {
        console.error(e);
        alert('保存失败：' + (e.message || e));
    }
}

    /* ===== 页面初始化 ===== */

    document.addEventListener('DOMContentLoaded', function () {
        loadUserInfo();
        loadContracts();

        const keywordInput = document.getElementById('keywordInput');
        const statusFilter = document.getElementById('statusFilter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let timer = null;
        keywordInput.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                state.keyword = keywordInput.value.trim();
                state.page = 1;
                loadContracts();
            }, 350);
        });

        statusFilter.addEventListener('change', () => {
            state.status = statusFilter.value;
            state.page = 1;
            loadContracts();
        });

        prevBtn.onclick = () => {
            if (state.page > 1) {
                state.page--;
                loadContracts();
            }
        };

        nextBtn.onclick = () => {
            state.page++;
            loadContracts();
        };

        window.onclick = function (event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    });
</script>

</body>
