<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同详情 · 智能物流合同管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f9ff;
            min-height: 100vh;
            color: #1e293b;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0b2b4a 0%, #123b5e 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 4px 0 20px rgba(0, 30, 60, 0.15);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #7ab7ff;
            backdrop-filter: blur(4px);
        }

        .logo-text h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.25s;
            margin-bottom: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 22px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, #2d6da0, #1a4b75);
            color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .nav-item.active i {
            color: #ffd966;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 35px;
            background: #f5f9ff;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(0, 30, 60, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
        }

        .page-title h1 {
            font-size: 24px;
            color: #1a4b75;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h1 i {
            color: #2d6da0;
            font-size: 28px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 40px;
            background: #f0f7ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-info:hover {
            background: #e3f0ff;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2d6da0, #1a4b75);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-details {
            line-height: 1.4;
        }

        .user-name {
            font-weight: 700;
            color: #1a4b75;
        }

        .user-role {
            font-size: 12px;
            color: #5f7d9c;
        }

        .content-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
            margin-bottom: 24px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #2d6da0, #1a4b75);
            color: white;
        }

        .action-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(45, 109, 160, 0.25);
        }

        .action-btn.danger {
            background: #eef5fb;
            color: #1a4b75;
            border: 1px solid #d7e4f2;
        }

        .action-btn.danger:hover {
            background: #e3f0ff;
        }

        .section-title {
            font-size: 20px;
            color: #1a4b75;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .info-item {
            background: #f8fbff;
            border: 1px solid #e3ecf5;
            border-radius: 18px;
            padding: 16px;
        }

        .info-item .label {
            font-size: 13px;
            color: #6b7b8f;
            margin-bottom: 8px;
        }

        .info-item .value {
            color: #1a4b75;
            font-weight: 600;
            word-break: break-all;
        }

        .content-box {
            background: #f8fbff;
            border: 1px solid #e3ecf5;
            border-radius: 18px;
            padding: 18px;
            min-height: 240px;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 2px solid #e3ecf5;
            color: #4f6f8f;
            font-size: 14px;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #eef2f6;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: #e3f7ec;
            color: #10b981;
        }

        .status-pending {
            background: #fff4e0;
            color: #f59e0b;
        }

        .status-expired {
            background: #fee9e9;
            color: #dc3545;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 90px;
            }

            .sidebar .logo-text,
            .sidebar .nav-item span {
                display: none;
            }

            .main-content {
                margin-left: 90px;
            }

            .nav-item {
                justify-content: center;
                padding: 14px 0;
            }

            .nav-item i {
                width: auto;
                font-size: 22px;
            }

            .logo-area {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-file-signature"></i>
                </div>
                <div class="logo-text">
                    <h2>智链·合同</h2>
                    <p>物流合同管理</p>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-item" onclick="window.location.href='/dashboard/index.html'">
                <i class="fas fa-chart-pie"></i>
                <span>数据仪表盘</span>
            </div>

            <div class="nav-item active" onclick="window.location.href='/contract/index.html'">
                <i class="fas fa-file-contract"></i>
                <span>合同管理</span>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </div>

            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1><i class="fas fa-file-lines"></i> 合同详情</h1>
            </div>

            <div class="user-profile">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">加载中...</div>
                        <div class="user-role" id="userRole">用户</div>
                    </div>
                    <i class="fas fa-chevron-down" style="color: #2d6da0; font-size: 14px;"></i>
                </div>
            </div>
        </div>

        <div class="content-card">
            <div class="section-title">基本信息</div>
            <div class="info-grid" id="contractInfoGrid"></div>
        </div>

        <div class="content-card">
            <div class="section-title">合同正文</div>

            <div class="action-buttons">
                <button class="action-btn primary" onclick="handleExportWord()">
                    <i class="fas fa-file-word"></i> 导出 Word
                </button>
                <button class="action-btn danger" onclick="handleExportPdf()">
                    <i class="fas fa-file-pdf"></i> 导出 PDF
                </button>
            </div>

            <div class="content-box" id="contractContent" style="margin-top: 16px;">加载中...</div>
        </div>

        <div class="content-card">
            <div class="section-title">解析字段</div>
            <div class="table-responsive">
                <table>
                    <thead>
                    <tr>
                        <th>字段编码</th>
                        <th>字段名称</th>
                        <th>字段值</th>
                        <th>置信度</th>
                    </tr>
                    </thead>
                    <tbody id="fieldTableBody"></tbody>
                </table>
                <div id="fieldEmptyHint" style="padding:20px 0; text-align:center; color:#6b7b8f;">暂无解析字段</div>
            </div>
        </div>
        <div class="content-card">
            <div class="section-title">合同流转</div>

            <div class="info-grid" id="flowInfoGrid">
                <div class="info-item">
                    <div class="label">当前流转状态</div>
                    <div class="value" id="flowStatusText">-</div>
                </div>
                <div class="info-item">
                    <div class="label">当前处理角色</div>
                    <div class="value" id="flowRoleText">-</div>
                </div>
                <div class="info-item">
                    <div class="label">提交审批时间</div>
                    <div class="value" id="flowSubmittedAt">-</div>
                </div>
                <div class="info-item">
                    <div class="label">最终审批时间</div>
                    <div class="value" id="flowApprovedAt">-</div>
                </div>
            </div>

            <div style="margin-top: 18px;">
                <div class="label" style="margin-bottom: 8px; color:#6b7b8f;">审批意见 / 流转备注</div>
                <textarea id="flowComment"
                          placeholder="请输入审批意见、退回原因或流转备注"
                          style="width:100%; min-height:90px; border:1px solid #dbe6f1; border-radius:14px; padding:12px; resize:vertical; font-size:14px;"></textarea>
            </div>

            <div class="action-buttons" id="flowActionButtons" style="margin-top: 18px;">
                <!-- 动态按钮 -->
            </div>

            <div style="margin-top: 24px;">
                <div class="section-title" style="font-size:18px;">流转记录</div>
                <div class="table-responsive">
                    <table>
                        <thead>
                        <tr>
                            <th>时间</th>
                            <th>动作</th>
                            <th>状态流转</th>
                            <th>角色流转</th>
                            <th>操作人</th>
                            <th>备注</th>
                        </tr>
                        </thead>
                        <tbody id="flowRecordTableBody"></tbody>
                    </table>
                    <div id="flowRecordEmptyHint" style="padding:20px 0; text-align:center; color:#6b7b8f;">暂无流转记录</div>
                </div>
            </div>
        </div>
    </main>
</div>


<script>

    let currentContractTitle = "合同文件";
    let currentContract = null;

    function authFetch(url, options = {}) {
        const token = sessionStorage.getItem('token') || localStorage.getItem('token');
        const headers = new Headers(options.headers || {});
        if (token) headers.set('Authorization', 'Bearer ' + token);
        return fetch(url, { ...options, headers });
    }

    function escapeHtml(str) {
        return String(str ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function formatDateTime(value) {
        if (!value) return '-';
        try {
            return value.replace('T', ' ').slice(0, 19);
        } catch {
            return value;
        }
    }

    function getRoleText(role) {
        const map = {
            BUSINESS: '业务人员',
            LEGAL: '法务',
            FINANCE: '财务',
            APPROVER: '审批人',
            ADMIN: '管理员',
            USER: '普通用户'
        };
        return map[role] || role || '-';
    }

    function getStatusText(status) {
        const map = {
            DRAFT: '草稿',
            UPLOADED: '已上传',
            PENDING_LEGAL: '待法务审核',
            PENDING_FINANCE: '待财务审核',
            PENDING_APPROVAL: '待审批',
            ACTIVE: '已生效',
            IN_PROGRESS: '履约中',
            COMPLETED: '已完成',
            EXPIRED: '已到期',
            TERMINATED: '已终止',
            ARCHIVED: '已归档'
        };
        return map[status] || status || '-';
    }

    function getStatusClass(status) {
    switch (status) {
        case 'ACTIVE':
        case 'COMPLETED':
        case 'IN_PROGRESS':
            return 'status-active';
        case 'DRAFT':
        case 'UPLOADED':
        case 'PENDING_LEGAL':
        case 'PENDING_FINANCE':
        case 'PENDING_APPROVAL':
            return 'status-pending';
        case 'EXPIRED':
        case 'TERMINATED':
        case 'ARCHIVED':
            return 'status-expired';
        default:
            return 'status-pending';
    }
}

    function loadUserInfo() {
        try {
            const userInfoStr = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
            if (!userInfoStr) {
                window.location.href = '/auth/login.html';
                return;
            }
            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('userName').textContent = userInfo.username || '用户';
            document.getElementById('userAvatar').textContent = (userInfo.username || 'U').charAt(0).toUpperCase();

            const roleMap = {
                admin: '超级管理员',
                ADMIN: '系统管理员',
                user: '普通用户',
                USER: '普通用户',
                BUSINESS: '业务人员',
                business: '业务人员',
                LEGAL: '法务',
                legal: '法务',
                FINANCE: '财务',
                finance: '财务',
                APPROVER: '审批人',
                approver: '审批人',
                manager: '合同经理',
                MANAGER: '合同经理'
            };
            const rawRole = (userInfo.roleCode || userInfo.role || '').toString().toUpperCase();
            document.getElementById('userRole').textContent =
                roleMap[rawRole] || rawRole || '普通用户';
        } catch (e) {
            console.error(e);
            window.location.href = '/auth/login.html';
        }
    }

    function getCurrentUserInfo() {
        try {
            const userInfoStr = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
            if (!userInfoStr) return null;
            return JSON.parse(userInfoStr);
        } catch (e) {
            console.error('获取当前用户信息失败', e);
            return null;
        }
    }

    function getCurrentUserId() {
        const user = getCurrentUserInfo();
        return user?.userId || user?.id || null;
    }

    function getCurrentUserRole() {
        const user = getCurrentUserInfo();
        return user?.roleCode || user?.role || null;
    }


    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('userInfo');
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('userInfo');
        window.location.href = '/auth/login.html';
    }

    function getContractId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id') || params.get('contractId');
}

    function safeFileName(name) {
    return name.replace(/[\\/:*?"<>|]/g, '_');
}

    function downloadBlob(blob, fileName) {
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);
}

function renderFlowSummary(contract) {
    document.getElementById('flowStatusText').textContent = getStatusText(contract.status);
    document.getElementById('flowRoleText').textContent = getRoleText(contract.currentHandlerRole);
    document.getElementById('flowSubmittedAt').textContent = formatDateTime(contract.submittedAt);
    document.getElementById('flowApprovedAt').textContent = formatDateTime(contract.approvedAt);
}

function renderFlowActions(contract) {
    const container = document.getElementById('flowActionButtons');
    container.innerHTML = '';

    const role = getCurrentUserRole();
    if (!contract || !contract.status) return;

    const contractId = contract.contractId;

    if (contract.status === 'DRAFT' && role === 'BUSINESS') {
        container.innerHTML = `
            <button class="action-btn primary" onclick="handleFlowSubmit(${contractId})">
                <i class="fas fa-paper-plane"></i> 提交法务审核
            </button>
        `;
        return;
    }

    if (contract.status === 'PENDING_LEGAL' && role === 'LEGAL') {
        container.innerHTML = `
            <button class="action-btn primary" onclick="handleLegalApprove(${contractId})">
                <i class="fas fa-check"></i> 法务通过
            </button>
            <button class="action-btn danger" onclick="handleLegalReject(${contractId})">
                <i class="fas fa-rotate-left"></i> 法务退回
            </button>
        `;
        return;
    }

    if (contract.status === 'PENDING_FINANCE' && role === 'FINANCE') {
        container.innerHTML = `
            <button class="action-btn primary" onclick="handleFinanceApprove(${contractId})">
                <i class="fas fa-check"></i> 财务通过
            </button>
            <button class="action-btn danger" onclick="handleFinanceReject(${contractId})">
                <i class="fas fa-rotate-left"></i> 财务退回
            </button>
        `;
        return;
    }

    if (contract.status === 'PENDING_APPROVAL' && role === 'APPROVER') {
        container.innerHTML = `
            <button class="action-btn primary" onclick="handleApproverApprove(${contractId})">
                <i class="fas fa-stamp"></i> 审批通过
            </button>
            <button class="action-btn danger" onclick="handleApproverReject(${contractId})">
                <i class="fas fa-ban"></i> 审批驳回
            </button>
        `;
        return;
    }

    if (contract.status === 'ACTIVE') {
        container.innerHTML = `
            <span style="color:#10b981; font-weight:600;">当前合同已生效</span>
        `;
        return;
    }

    container.innerHTML = `
        <span style="color:#6b7b8f;">当前角色在此状态下无可执行操作</span>
    `;
}

function handleFlowSubmit(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/submit`, contractId);
}

function handleLegalApprove(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/legal/approve`, contractId);
}

function handleLegalReject(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/legal/reject`, contractId);
}

function handleFinanceApprove(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/finance/approve`, contractId);
}

function handleFinanceReject(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/finance/reject`, contractId);
}

function handleApproverApprove(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/approver/approve`, contractId);
}

function handleApproverReject(contractId) {
    postFlowAction(`/api/contracts/${contractId}/flow/approver/reject`, contractId);
}

async function loadFlowRecords(contractId) {
    const tbody = document.getElementById('flowRecordTableBody');
    const emptyHint = document.getElementById('flowRecordEmptyHint');

    try {
        const resp = await authFetch(`/api/contracts/${contractId}/flow/records`);
        if (!resp.ok) throw new Error('获取流转记录失败');

        const result = await resp.json();
        if (result.code !== 200) throw new Error(result.message || '获取流转记录失败');

        const records = result.data || [];

        if (!records.length) {
            tbody.innerHTML = '';
            emptyHint.style.display = 'block';
            return;
        }

        tbody.innerHTML = records.map(item => `
            <tr>
                <td>${formatDateTime(item.createdAt)}</td>
                <td>${escapeHtml(item.actionType || '-')}</td>
                <td>${escapeHtml(getStatusText(item.fromStatus))} → ${escapeHtml(getStatusText(item.toStatus))}</td>
                <td>${escapeHtml(getRoleText(item.fromRole))} → ${escapeHtml(getRoleText(item.toRole))}</td>
                <td>${item.operatorId ?? '-'}</td>
                <td>${escapeHtml(item.comment || '-')}</td>
            </tr>
        `).join('');

        emptyHint.style.display = 'none';
    } catch (e) {
        console.error(e);
        tbody.innerHTML = `<tr><td colspan="6" style="color:#dc3545;">加载失败：${escapeHtml(e.message || e)}</td></tr>`;
        emptyHint.style.display = 'none';
    }
}

async function postFlowAction(url, contractId) {
    const operatorId = getCurrentUserId();
    const comment = document.getElementById('flowComment').value || '';

    if (!operatorId) {
        alert('未获取到当前用户ID，请重新登录');
        return;
    }

    try {
        const resp = await authFetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                operatorId,
                comment
            })
        });

        const result = await resp.json();

        if (!resp.ok || result.code !== 200) {
            throw new Error(result.message || '流转操作失败');
        }

        alert(result.message || '操作成功');

        document.getElementById('flowComment').value = '';
        await loadContractDetail();
        await loadFlowRecords(contractId);
    } catch (e) {
        console.error(e);
        alert('操作失败：' + (e.message || e));
    }
}

    async function loadContractDetail() {
    const contractId = getContractId();
    if (!contractId) {
        document.getElementById('contractContent').textContent = '缺少合同ID';
        return;
    }

    try {
        const resp = await authFetch(`/api/contracts/${contractId}`);
        if (!resp.ok) throw new Error('获取合同详情失败');

        const result = await resp.json();
        if (result.code !== 200) throw new Error(result.message || '获取合同详情失败');

        const contract = result.data || {};
        currentContract = contract;
        currentContractTitle = contract.title || "合同文件";

        const grid = document.getElementById('contractInfoGrid');

        grid.innerHTML = `
            <div class="info-item">
                <div class="label">合同ID</div>
                <div class="value">${contract.contractId ?? '-'}</div>
            </div>
            <div class="info-item">
                <div class="label">合同编号</div>
                <div class="value">${escapeHtml(contract.contractNo || '-')}</div>
            </div>
            <div class="info-item">
                <div class="label">合同标题</div>
                <div class="value">${escapeHtml(contract.title || '-')}</div>
            </div>
            <div class="info-item">
                <div class="label">合同类型</div>
                <div class="value">${escapeHtml(contract.contractType || '-')}</div>
            </div>
            <div class="info-item">
                <div class="label">状态</div>
                <div class="value">
                    <span class="status-badge ${getStatusClass(contract.status)}">
                        ${escapeHtml(getStatusText(contract.status))}
                    </span>
                </div>
            </div>
            <div class="info-item">
                <div class="label">当前处理角色</div>
                <div class="value">${escapeHtml(getRoleText(contract.currentHandlerRole))}</div>
            </div>
            <div class="info-item">
                <div class="label">创建时间</div>
                <div class="value">${formatDateTime(contract.createdAt)}</div>
            </div>
            <div class="info-item">
                <div class="label">更新时间</div>
                <div class="value">${formatDateTime(contract.updatedAt)}</div>
            </div>
            <div class="info-item">
                <div class="label">当前版本ID</div>
                <div class="value">${contract.currentVersionId ?? '-'}</div>
            </div>
            <div class="info-item">
                <div class="label">模板ID</div>
                <div class="value">${contract.templateId ?? '-'}</div>
            </div>
        `;

        document.getElementById('contractContent').textContent =
            contract.content || '暂无合同正文内容';

        renderFlowSummary(contract);
        renderFlowActions(contract);
        await loadFlowRecords(contract.contractId);

    } catch (e) {
        console.error(e);
        document.getElementById('contractContent').textContent = '加载失败：' + (e.message || e);
    }
}

    async function loadContractFields() {
        const contractId = getContractId();
        if (!contractId) return;

        const tbody = document.getElementById('fieldTableBody');
        const emptyHint = document.getElementById('fieldEmptyHint');

        try {
            const resp = await authFetch(`/api/contracts/${contractId}/fields`);
            if (!resp.ok) throw new Error('获取字段失败');

            const result = await resp.json();
            if (result.code !== 200) throw new Error(result.message || '获取字段失败');

            const fields = result.data || [];

            if (!fields.length) {
                tbody.innerHTML = '';
                emptyHint.style.display = 'block';
                return;
            }

            tbody.innerHTML = fields.map(field => `
                <tr>
                    <td>${escapeHtml(field.fieldKey || '-')}</td>
                    <td>${escapeHtml(field.fieldName || '-')}</td>
                    <td>${escapeHtml(field.fieldValue || '-')}</td>
                    <td>${field.confidence != null ? (Number(field.confidence) * 100).toFixed(0) + '%' : '-'}</td>
                </tr>
            `).join('');

            emptyHint.style.display = 'none';
        } catch (e) {
            console.error(e);
            tbody.innerHTML = `<tr><td colspan="4" style="color:#dc3545;">加载失败：${escapeHtml(e.message || e)}</td></tr>`;
            emptyHint.style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', async function () {
        loadUserInfo();
        await loadContractDetail();
        await loadContractFields();
    });
</script>
