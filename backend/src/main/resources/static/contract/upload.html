<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传合同 · 智能物流合同管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f9ff;
            min-height: 100vh;
            color: #1e293b;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0b2b4a 0%, #123b5e 100%);
            color: white;
            padding: 30px 0;
            box-shadow: 4px 0 20px rgba(0, 30, 60, 0.15);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #7ab7ff;
            backdrop-filter: blur(4px);
        }

        .logo-text h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.25s;
            margin-bottom: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 22px;
            font-size: 18px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(5px);
        }

        .nav-item.active {
            background: linear-gradient(95deg, #2d6da0, #1a4b75);
            color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .nav-item.active i {
            color: #ffd966;
        }

        .nav-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 35px;
            background: #f5f9ff;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(0, 30, 60, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
        }

        .page-title h1 {
            font-size: 24px;
            color: #1a4b75;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title h1 i {
            color: #2d6da0;
            font-size: 28px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 40px;
            background: #f0f7ff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-info:hover {
            background: #e3f0ff;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #2d6da0, #1a4b75);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-details {
            line-height: 1.4;
        }

        .user-name {
            font-weight: 700;
            color: #1a4b75;
        }

        .user-role {
            font-size: 12px;
            color: #5f7d9c;
        }

        .content-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(45, 109, 160, 0.05);
            border: 1px solid rgba(45, 109, 160, 0.1);
            max-width: 920px;
        }

        .section-title {
            font-size: 22px;
            color: #1a4b75;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a4b75;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e3ecf5;
            border-radius: 16px;
            outline: none;
            font-size: 14px;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2d6da0;
        }

        .hint {
            font-size: 13px;
            color: #6b7b8f;
            margin-top: 8px;
        }

        .btn-primary, .btn-outline {
            border-radius: 30px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: white;
            border: 1px solid #c9dced;
            color: #1a4b75;
        }

        .btn-primary {
            background: linear-gradient(145deg, #2d6da0, #1a4b75);
            color: white;
        }

        .result-box {
            margin-top: 22px;
            padding: 16px;
            border-radius: 18px;
            background: #f8fbff;
            border: 1px solid #dbe7f3;
            display: none;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 90px;
            }

            .sidebar .logo-text,
            .sidebar .nav-item span {
                display: none;
            }

            .main-content {
                margin-left: 90px;
            }

            .nav-item {
                justify-content: center;
                padding: 14px 0;
            }

            .nav-item i {
                width: auto;
                font-size: 22px;
            }

            .logo-area {
                justify-content: center;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .content-card {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-file-signature"></i>
                </div>
                <div class="logo-text">
                    <h2>智链·合同</h2>
                    <p>物流合同管理</p>
                </div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-item" onclick="window.location.href='/dashboard/index.html'">
                <i class="fas fa-chart-pie"></i>
                <span>数据仪表盘</span>
            </div>

            <div class="nav-item" onclick="window.location.href='/contract/index.html'">
                <i class="fas fa-file-contract"></i>
                <span>合同管理</span>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </div>

            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="user-profile">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">加载中...</div>
                        <div class="user-role" id="userRole">用户</div>
                    </div>
                    <i class="fas fa-chevron-down" style="color: #2d6da0; font-size: 14px;"></i>
                </div>
            </div>
        </div>

        <div class="content-card">
            <div class="section-title">合同上传表单</div>

            <div class="form-group">
                <label for="title">合同标题</label>
                <input type="text" id="title" placeholder="请输入合同标题">
            </div>

            <div class="form-group">
                <label for="contractType">合同类型</label>
                <select id="contractType">
                    <option value="">请选择合同类型</option>
                    <option value="transport">运输合同</option>
                    <option value="warehouse">仓储合同</option>
                    <option value="supply">供应链协议</option>
                </select>
            </div>

            <div class="form-group">
                <label for="file">合同文件</label>
                <input type="file" id="file"
                       accept=".pdf,.doc,.docx,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain">
                <div class="hint">支持 PDF / DOC / DOCX / TXT，建议不超过 20MB</div>
            </div>

            <div style="display:flex; gap:12px; margin-top:10px; flex-wrap:wrap;">
                <button class="btn-primary" onclick="uploadContract()">
                    <i class="fas fa-upload"></i> 上传合同
                </button>

                <button class="btn-outline" onclick="window.location.href='/contract/index.html'">
                    返回合同列表
                </button>
            </div>

            <div class="result-box" id="resultBox"></div>
        </div>
    </main>
</div>

<script>
    function authFetch(url, options = {}) {
        const token = sessionStorage.getItem('token') || localStorage.getItem('token');
        const headers = new Headers(options.headers || {});
        if (token) headers.set('Authorization', 'Bearer ' + token);
        return fetch(url, { ...options, headers });
    }

    function loadUserInfo() {
        try {
            const userInfoStr = localStorage.getItem('userInfo') || sessionStorage.getItem('userInfo');
            if (!userInfoStr) {
                window.location.href = '/auth/login.html';
                return;
            }

            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('userName').textContent = userInfo.username || '用户';
            document.getElementById('userAvatar').textContent = (userInfo.username || 'U').charAt(0).toUpperCase();

            const roleMap = {
                admin: '超级管理员',
                ADMIN: '系统管理员',
                user: '普通用户',
                USER: '普通用户',
                manager: '合同经理',
                MANAGER: '合同经理'
            };
            const rawRole = (userInfo.role || userInfo.roleCode || '').toString();
            document.getElementById('userRole').textContent =
                roleMap[rawRole] || roleMap[rawRole.toUpperCase()] || rawRole || '普通用户';
        } catch (e) {
            console.error(e);
            window.location.href = '/auth/login.html';
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('userInfo');
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('userInfo');
        window.location.href = '/auth/login.html';
    }

    async function uploadContract() {
        const title = document.getElementById('title').value.trim();
        const contractType = document.getElementById('contractType').value;
        const fileInput = document.getElementById('file');
        const resultBox = document.getElementById('resultBox');

        if (!title) {
            alert('请输入合同标题');
            return;
        }

        if (!contractType) {
            alert('请选择合同类型');
            return;
        }

        if (!fileInput.files || fileInput.files.length === 0) {
            alert('请选择合同文件');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);
        formData.append('title', title);
        formData.append('contractType', contractType);

        try {
            const resp = await authFetch('/api/contracts/upload', {
                method: 'POST',
                body: formData
            });

            const result = await resp.json().catch(() => ({}));

            if (!resp.ok || result.code !== 200) {
                throw new Error(result.message || '上传失败');
            }

            const data = result.data || {};
            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <div style="font-weight:700; color:#1a4b75; margin-bottom:8px;">上传成功</div>
                <div>合同ID：${data.contractId ?? '-'}</div>
                <div>合同编号：${data.contractNo ?? '-'}</div>
                <div>版本ID：${data.versionId ?? '-'}</div>
                <div>状态：${data.status ?? '-'}</div>
                <div style="margin-top:12px;">
                    <button class="btn-outline" onclick="window.location.href='/contract/detail.html?id=${data.contractId}'">查看详情</button>
                </div>
            `;
        } catch (e) {
            console.error(e);
            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <div style="font-weight:700; color:#dc3545; margin-bottom:8px;">上传失败</div>
                <div>${e.message || e}</div>
            `;
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadUserInfo();
    });
</script>
</body>
</html>
