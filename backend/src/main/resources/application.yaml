server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-exception: true
    include-stacktrace: always

spring:
  datasource:
    url: jdbc:h2:file:D:/contract-management-system/data/contract_db;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  jwt:
    secret: "change-me-to-a-long-random-string-change-me-1234567890"
    expireMinutes: 1440

  admin:
    username: admin
    password: admin123456

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: contract-files

contract:
  upload:
    allowed-extensions:
      - pdf
      - doc
      - docx
    max-size: 20971520